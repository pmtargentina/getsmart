<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GetSmart - Informe de Rendimiento Avanzado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #2bc032; }
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        .audit-card { border: none; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); overflow: hidden; }
        .header-blue { background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%); color: white; padding: 40px; }
        .chart-container { position: relative; height: 200px; width: 100%; }
        .status-bar { height: 10px; border-radius: 5px; background: #eee; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container my-5">
        <div class="card audit-card mx-auto" style="max-width: 1000px;">
            <div class="header-blue text-center">
                <h1 class="h2 mb-0">ANÁLISIS DE INFRAESTRUCTURA GETSMART</h1>
                <p id="pc-tag" class="opacity-75 mt-2 small"></p>
            </div>

            <div class="card-body p-4">
                <div class="row text-center mb-5">
                    <div class="col-md-4">
                        <h6>Rendimiento RAM</h6>
                        <canvas id="ramChart"></canvas>
                        <p id="ram-info" class="fw-bold mt-2"></p>
                    </div>
                    <div class="col-md-4">
                        <h6>Velocidad Disco (MB/s)</h6>
                        <canvas id="diskChart"></canvas>
                        <p id="disk-info" class="fw-bold mt-2"></p>
                    </div>
                    <div class="col-md-4">
                        <h6>Puntaje GetSmart</h6>
                        <canvas id="scoreChart"></canvas>
                        <p class="small text-muted">Eficiencia General</p>
                    </div>
                </div>

                <div class="row">
                    <div class="col-lg-6">
                        <h5 class="border-bottom pb-2 mb-3">Especificaciones Detectadas</h5>
                        <ul class="list-unstyled">
                            <li class="mb-3"><strong>Procesador:</strong> <span id="cpu-name" class="text-muted d-block small"></span></li>
                            <li class="mb-3"><strong>Placa de Video (GPU):</strong> <span id="gpu-name" class="text-primary d-block"></span></li>
                        </ul>
                    </div>
                    <div class="col-lg-6">
                        <h5 class="border-bottom pb-2 mb-3">Unidades de Almacenamiento</h5>
                        <div id="disks-list"></div>
                    </div>
                </div>

                <div class="text-center mt-5">
                    <a href="https://wa.me/TUNUMERO" class="btn btn-primary btn-lg px-5 shadow-lg" style="border-radius: 30px;">
                        <i class="fab fa-whatsapp me-2"></i> Solicitar Optimización Avanzada
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const p = new URLSearchParams(window.location.search);
        
        // Cargar Datos Básicos
        document.getElementById('pc-tag').innerText = "ID DISPOSITIVO: " + p.get('pc');
        document.getElementById('cpu-name').innerText = p.get('cpu');
        document.getElementById('gpu-name').innerText = p.get('gpu') || "Cargando...";

        // Procesar Discos
        const disksData = p.get('disks').split(';');
        let diskListHtml = "";
        let maxVel = 0;

        disksData.forEach(d => {
            const [model, cap, vel, type] = d.split('|');
            if (parseInt(vel) > maxVel) maxVel = parseInt(vel);
            diskListHtml += `
                <div class="mb-3 p-2 bg-light rounded">
                    <span class="small fw-bold">${model}</span><br>
                    <span class="badge ${type === 'SSD' ? 'bg-success' : 'bg-secondary'}">${type}</span>
                    <span class="small text-muted">${cap} GB | ${vel} MB/s</span>
                </div>`;
        });
        document.getElementById('disks-list').innerHTML = diskListHtml;

        // --- CONFIGURACIÓN DE GRÁFICOS (Chart.js) ---
        
        // Gráfico RAM (Doughnut)
        const ramVal = parseInt(p.get('ram'));
        new Chart(document.getElementById('ramChart'), {
            type: 'doughnut',
            data: {
                datasets: [{
                    data: [ramVal, 16 - ramVal > 0 ? 16 - ramVal : 0],
                    backgroundColor: [ramVal < 8 ? '#e74c3c' : '#2ecc71', '#eee']
                }]
            },
            options: { cutout: '80%' }
        });
        document.getElementById('ram-info').innerText = ramVal + " GB";

        // Gráfico Velocidad Disco (Gauge style)
        new Chart(document.getElementById('diskChart'), {
            type: 'bar',
            data: {
                labels: ['Su Velocidad', 'Ideal SSD'],
                datasets: [{
                    label: 'MB/s',
                    data: [maxVel, 500],
                    backgroundColor: [maxVel < 150 ? '#e74c3c' : '#3498db', '#2c3e50']
                }]
            }
        });
        document.getElementById('disk-info').innerText = maxVel + " MB/s";

        // Gráfico Score Final
        const score = Math.min(((ramVal/16)*50) + ((maxVel/500)*50), 100);
        new Chart(document.getElementById('scoreChart'), {
            type: 'polarArea',
            data: {
                labels: ['Puntaje'],
                datasets: [{
                    data: [score],
                    backgroundColor: [score < 50 ? '#e74c3c' : '#2ecc71']
                }]
            }
        });
    </script>
</body>
</html>
